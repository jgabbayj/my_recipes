name: Google Play Store Release (Internal Testing)

on:
  push:
    branches:
      - prod

jobs:
  release:
    name: Build & Release to Google Play Internal Track
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.PLAY_KEYSTORE_BASE64 }}" | base64 --decode > app/upload-keystore.jks

      - name: Create keystore.properties
        run: |
          echo "storeFile=upload-keystore.jks" > keystore.properties
          echo "storePassword=${{ secrets.PLAY_KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.PLAY_KEYALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.PLAY_KEY_PASSWORD }}" >> keystore.properties

      - name: Decode Google Services JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > app/google-services.json

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Android App Bundle (AAB)
        run: ./gradlew bundleRelease
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Upload to Google Play Store (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.morsel.recipes
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
